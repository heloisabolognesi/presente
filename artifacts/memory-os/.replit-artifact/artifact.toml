kind = "web"
previewPath = "/"
title = "MEMORIES OS"
version = "1.0.0"
id = "artifacts/memory-os"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18322

[services.development]
run = "pnpm --filter @workspace/memory-os run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/memory-os", "run", "build" ]
serve = "static"
publicDir = "artifacts/memory-os/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18322"
BASE_PATH = "/"
